[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
warn_return_any = true
warn_unused_ignores = true

[tool.ruff]
target-version = "py310"
line-length = 120
select = ["E", "W", "F", "N", "B", "UP", "RUF"]
ignore = ["E501", "N802", "N803", "N806", "RUF012"]

[tool.ruff.per-file-ignores]
"tests/*" = ["S101", "S106"]
"backtesting/*" = ["S101"]
